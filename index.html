<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Smos — Lab Tracker</title>
<style>
:root{
  --red:#E53935;--red-light:#FFEBEE;--orange:#F57C00;--orange-light:#FFF3E0;
  --green:#2E7D32;--green-light:#E8F5E9;--gray:#607D8B;--gray-light:#ECEFF1;
  --blue:#1565C0;--blue-light:#E3F2FD;--bg:#F5F7FA;
  --border:#DDE3EA;--text:#1A2332;--muted:#5A6A7A;
  --primary:#1565C0;--primary-dark:#0D47A1;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;background:linear-gradient(135deg,#0D47A1 0%,#1565C0 40%,#1976D2 70%,#0A2A6E 100%);}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative;z-index:2;}

.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-icon{font-size:44px;margin-bottom:8px;}
.login-logo h1{font-size:22px;font-weight:700;color:var(--primary);}
.login-logo p{font-size:13px;color:var(--muted);margin-top:4px;}
.lerr{background:var(--red-light);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.header{background:var(--primary);color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.logo{font-size:17px;font-weight:700;}
.logo span{opacity:.65;font-weight:400;font-size:12px;margin-left:6px;}
.header-right{display:flex;align-items:center;gap:7px;}
.huser{font-size:12px;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:6px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bhdr{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 11px;border-radius:6px;font-size:12px;cursor:pointer;}
.bhdr:hover{background:rgba(255,255,255,.25);}
.bso{background:rgba(220,50,50,.35);color:#fff;border:1px solid rgba(255,100,100,.4);padding:6px 11px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;}
.bso:hover{background:rgba(220,50,50,.55);}
.tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 16px;position:sticky;top:56px;z-index:99;overflow-x:auto;}
.tab{padding:13px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab:hover{color:var(--primary);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.tbadge{border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;color:#fff;}
.tbadge.red{background:var(--red);}.tbadge.orange{background:var(--orange);}.tbadge.gray{background:var(--gray);}
.content{padding:14px 16px;max-width:1100px;margin:0 auto;}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sort-sel{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:#fff;outline:none;cursor:pointer;white-space:nowrap;}
.sort-sel:focus{border-color:var(--primary);}
.burgent{background:#fff;color:#7B1FA2;border:1px solid #7B1FA2;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
.burgent:hover{background:#7B1FA2;color:#fff;}
.burgent.active{background:#7B1FA2;color:#fff;}
.urgent-badge{background:#7B1FA2;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700;margin-left:4px;}
.bnew{background:var(--primary);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.bnew:hover{background:var(--primary-dark);}
.search-bar{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;display:flex;align-items:center;gap:8px;flex:1;}
.search-bar input{border:none;outline:none;flex:1;font-size:14px;color:var(--text);background:transparent;}
/* CARD */
.rcard{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;border-left:4px solid var(--border);overflow:hidden;transition:box-shadow .15s;}
.rcard:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);}
.rcard.over-tat{border-left-color:var(--red);}
.rcard.approaching{border-left-color:var(--orange);}
.rcard.on-track{border-left-color:var(--green);}
.rcard.completed{border-left-color:var(--gray);}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;}
.card-header.over-tat{background:var(--red-light);}
.card-header.approaching{background:var(--orange-light);}
.card-header.on-track{background:var(--green-light);}
.card-header.completed{background:var(--gray-light);}
.card-header-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.card-id-pill{background:rgba(0,0,0,.08);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.card-patient-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sbadge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.sbadge.over{background:var(--red);color:#fff;}
.sbadge.approach{background:var(--orange);color:#fff;}
.sbadge.ontrack{background:var(--green);color:#fff;}
.sbadge.done{background:var(--gray);color:#fff;}
.bedit{background:#fff;color:var(--blue);border:1px solid var(--blue);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
.bedit:hover{background:var(--blue);color:#fff;}
.bdel{background:#fff;color:var(--red);border:1px solid var(--red);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
.bdel:hover{background:var(--red);color:#fff;}
.card-body{padding:12px 14px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.ci{display:flex;flex-direction:column;gap:2px;}
.ci-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.ci-val{font-size:13px;color:var(--text);font-weight:500;}
.ci-val.blue{color:var(--blue);font-weight:600;}
.ci-val.red{color:var(--red);font-weight:700;}
.ci-val.orange{color:var(--orange);font-weight:700;}
.ci-val.green{color:var(--green);font-weight:700;}
.card-footer{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:#fafafa;}
.bcomplete{background:var(--green);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
.bcomplete:hover{background:#1B5E20;}
.breopen{background:var(--orange);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
.breopen:hover{background:#E65100;}
.group-header{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;padding-left:2px;}
/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px;}
.moverlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-sm{max-width:400px;}.modal-lg{max-width:720px;}
.mhdr{padding:16px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:14px 14px 0 0;}
.mtitle{font-size:16px;font-weight:700;}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:2px 6px;border-radius:6px;}
.mclose:hover{background:var(--gray-light);}
.mbody{padding:18px 22px;}
.mfoot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.req{color:var(--red);}
.fi,.fs{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border .15s;}
.fi:focus,.fs:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(21,101,192,.1);}
.fi[readonly]{background:var(--bg);color:var(--muted);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sdiv{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 10px;padding-bottom:5px;border-bottom:2px solid var(--blue-light);}
/* TEST SEARCH */
.tswrap{position:relative;margin-bottom:8px;}
.tsinput{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);outline:none;transition:border .15s;}
.tsinput:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(21,101,192,.1);}
.tsicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.tdd{border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;display:none;background:#fff;margin-bottom:8px;}
.tdd.open{display:block;}
.tdi{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);}
.tdi:last-child{border-bottom:none;}
.tdi:hover,.tdi.sel{background:var(--blue-light);}
.tn{font-weight:600;font-size:13px;}.tc{font-size:11px;color:var(--muted);}.tt{font-size:12px;color:var(--blue);font-weight:600;}
.stags{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-bottom:8px;}
.stag{display:flex;align-items:center;gap:5px;background:var(--blue-light);color:var(--blue);border:1px solid var(--blue);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;}
.stag button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:15px;line-height:1;padding:0;}
.ntr{padding:12px;text-align:center;color:var(--muted);font-size:13px;}
.bp{background:var(--primary);color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.bp:hover:not(:disabled){background:var(--primary-dark);}
.bp:disabled{background:#90a4ae;cursor:not-allowed;}
.bs{background:#fff;color:var(--text);border:1px solid var(--border);padding:9px 18px;border-radius:8px;font-size:14px;cursor:pointer;}
.bs:hover{background:var(--bg);}
.bdng{background:var(--red);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;}
.bdng:hover{background:#B71C1C;}
.bsm{padding:5px 12px;font-size:12px;border-radius:6px;border:none;cursor:pointer;font-weight:600;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.utable{width:100%;border-collapse:collapse;}
.utable th{background:var(--bg);padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.utable td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.utable tr:last-child td{border-bottom:none;}
.rb{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.rb.admin{background:var(--blue-light);color:var(--blue);}.rb.staff{background:var(--green-light);color:var(--green);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.eicon{font-size:44px;margin-bottom:10px;}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A2332;color:#fff;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;display:none;white-space:nowrap;}
.toast.show{display:block;animation:fup .3s ease;}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@media(max-width:600px){.frow{grid-template-columns:1fr;}.card-grid{grid-template-columns:1fr 1fr;}.huser{display:none;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" style="display:none;">
  <div class="login-wrap">
    
    <div class="login-card" style="z-index:2;">
      <div class="login-logo">
        <div class="login-logo-icon">🔬</div>
        <h1>Team Smos</h1>
        <p>External Lab Tracking System</p>
      </div>
      <div class="lerr" id="loginErr"></div>
      <div class="fg"><label class="fl">Username</label><input class="fi" id="loginUser" placeholder="Enter username" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="bp" id="loginBtn" style="width:100%;margin-top:6px;" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">
  <div class="header">
    <div class="logo">🔬 Team Smos <span>Lab Tracker</span></div>
    <div class="header-right">
      <span class="huser" id="huser"></span>
      <button class="bhdr" onclick="openChangePw()">🔑 Password</button>
      <div id="adminBtns" style="display:none;"><button class="bhdr" onclick="openUserMgmt()">👥 Users</button></div>
      <button class="bso" onclick="doLogout()">⏻ Sign Out</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('overtat')" id="tab-overtat">🔴 Over TAT <span class="tbadge red" id="b-overtat">0</span></div>
    <div class="tab" onclick="switchTab('pending')" id="tab-pending">🟡 Pending <span class="tbadge orange" id="b-pending">0</span></div>
    <div class="tab" onclick="switchTab('completed')" id="tab-completed">✅ Completed <span class="tbadge gray" id="b-completed">0</span></div>
  </div>
  <div class="content">
    <div class="toolbar">
      <button class="bnew" onclick="openNew()">+ New Request</button>
      <div class="search-bar"><span>🔍</span><input type="text" placeholder="Search ID, Patient, Partner, Test, Country, Remark..." id="searchInput" oninput="renderTab()"></div>
      <select class="sort-sel" id="sortSel" onchange="renderTab()">
        <option value="default">Sort: Default</option>
        <option value="date_asc">Date ↑ Oldest</option>
        <option value="date_desc">Date ↓ Newest</option>
        <option value="tat_asc">TAT ↑ Urgent first</option>
        <option value="patient_az">Patient A→Z</option>
      </select>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<!-- REQUEST MODAL -->
<div class="moverlay" id="reqModal">
  <div class="modal">
    <div class="mhdr"><div class="mtitle" id="reqTitle">New Request</div><button class="mclose" onclick="closeM('reqModal')">×</button></div>
    <div class="mbody">
      <div class="sdiv">Request Info</div>
      <div class="frow">
        <div class="fg"><label class="fl">Request ID <span class="req">*</span></label><input class="fi" id="f-rid" placeholder="BTD-000001"></div>
        <div class="fg"><label class="fl">Date & Time</label><input class="fi" id="f-dt" readonly></div>
      </div>
      <div class="fg"><label class="fl">Patient Name <span class="req">*</span></label><input class="fi" id="f-patient" placeholder="Full name"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Physician / Institution</label><input class="fi" id="f-inst" placeholder="Hospital or doctor"></div>
        <div class="fg"><label class="fl">Partner Laboratory <span class="req">*</span></label>
          <select class="fs" id="f-partner" onchange="updateCountry()"><option value="">Select lab...</option></select>
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Country</label><input class="fi" id="f-country" readonly></div>
        <div class="fg"><label class="fl">Created By <span class="req">*</span></label>
          <select class="fs" id="f-createdby"><option value="">Select staff...</option></select>
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Specimen</label><input class="fi" id="f-specimen" placeholder="e.g. Blood, Urine"></div>
        <div class="fg"><label class="fl">Remark</label><input class="fi" id="f-remark" placeholder="Optional note"></div>
      </div>
      <div class="sdiv">Select Test <span style="color:var(--muted);font-size:11px;text-transform:none;font-weight:400;" id="testSectionHint">(one or more)</span></div>
      <div class="stags" id="stags"></div>
      <div class="tswrap"><span class="tsicon">🔍</span><input class="tsinput" id="tsearch" placeholder="Type to search test name..." oninput="filterTests()" onfocus="openTDD()" autocomplete="off"></div>
      <div class="tdd" id="tdd"></div>
    </div>
    <div class="mfoot">
      <button class="bs" onclick="closeM('reqModal')">Cancel</button>
      <button class="bp" id="reqSaveBtn" onclick="saveRequest()">Save Request</button>
    </div>
  </div>
</div>

<!-- COMPLETE MODAL -->
<div class="moverlay" id="completeModal">
  <div class="modal modal-sm">
    <div class="mhdr"><div class="mtitle">✔ Mark as Completed</div><button class="mclose" onclick="closeM('completeModal')">×</button></div>
    <div class="mbody">
      <p style="color:var(--muted);font-size:13px;margin-bottom:10px;">Who is releasing this result?</p>
      <select class="fs" id="releasedBy"><option value="">Select staff...</option></select>
    </div>
    <div class="mfoot">
      <button class="bs" onclick="closeM('completeModal')">Cancel</button>
      <button class="bp" id="confirmBtn" onclick="confirmComplete()">Confirm</button>
    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="moverlay" id="pwModal">
  <div class="modal modal-sm">
    <div class="mhdr"><div class="mtitle">🔑 Change Password</div><button class="mclose" onclick="closeM('pwModal')">×</button></div>
    <div class="mbody">
      <div class="lerr" id="pwErr"></div>
      <div class="fg"><label class="fl">Current Password <span class="req">*</span></label><input class="fi" type="password" id="pw-old" placeholder="Current password" onkeydown="if(event.key==='Enter')doChangePw()"></div>
      <div class="fg"><label class="fl">New Password <span class="req">*</span></label><input class="fi" type="password" id="pw-new" placeholder="New password" onkeydown="if(event.key==='Enter')doChangePw()"></div>
      <div class="fg"><label class="fl">Confirm New Password <span class="req">*</span></label><input class="fi" type="password" id="pw-confirm" placeholder="Confirm" onkeydown="if(event.key==='Enter')doChangePw()"></div>
    </div>
    <div class="mfoot">
      <button class="bs" onclick="closeM('pwModal')">Cancel</button>
      <button class="bp" id="pwBtn" onclick="doChangePw()">Update Password</button>
    </div>
  </div>
</div>

<!-- USER MGMT -->
<div class="moverlay" id="userModal">
  <div class="modal modal-lg">
    <div class="mhdr"><div class="mtitle">👥 User Management</div><button class="mclose" onclick="closeM('userModal')">×</button></div>
    <div class="mbody">
      <div style="display:flex;justify-content:flex-end;margin-bottom:14px;"><button class="bp bsm" onclick="openAddUser()">+ Add User</button></div>
      <div id="userList"></div>
    </div>
  </div>
</div>

<!-- ADD USER -->
<div class="moverlay" id="addUserModal">
  <div class="modal modal-sm">
    <div class="mhdr"><div class="mtitle">Add New User</div><button class="mclose" onclick="closeM('addUserModal')">×</button></div>
    <div class="mbody">
      <div class="lerr" id="addUserErr"></div>
      <div class="fg"><label class="fl">Username <span class="req">*</span></label><input class="fi" id="nu-user" placeholder="Enter username" onkeydown="if(event.key==='Enter')doAddUser()"></div>
      <div class="fg"><label class="fl">Password <span class="req">*</span></label><input class="fi" type="password" id="nu-pass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doAddUser()"></div>
      <div class="fg"><label class="fl">Role <span class="req">*</span></label><select class="fs" id="nu-role"><option value="Staff">Staff</option><option value="Admin">Admin</option></select></div>
    </div>
    <div class="mfoot">
      <button class="bs" onclick="closeM('addUserModal')">Cancel</button>
      <button class="bp" id="addUserBtn" onclick="doAddUser()">Add User</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyHG1_uCzea7erAnkG6PgRFQSL0LGQNoKbY0D_9wxxV-XRy-SmvqPUo6t7BIodFgAzy/exec';
let allRequests=[],staffList=[],partnerLabs=[],testMaster=[],usersList=[];
let currentTab='overtat',currentUser=null,editingRowId=null,completingRowId=null,selTests={};
let isSaving=false;

window.onload=function(){
  const u=localStorage.getItem('labUser');
  if(u){currentUser=JSON.parse(u);showApp();}else showLogin();
};

function showLogin(){
  hide('mainApp');show('loginScreen');
  setBtn(document.getElementById('loginBtn'),'Sign In',false);

// TAT
function calcDue(dt,val,unit){const d=new Date(dt);const v=parseFloat(val);if(unit==='Hours')d.setTime(d.getTime()+v*3600000);else d.setDate(d.getDate()+v);return d;}
function tatStatus(r){
  if(r.Status==='Completed')return'completed';
  const due=calcDue(r.Request_DateTime,r.TAT_Value,r.TAT_Unit);const now=new Date();
  if(now>due)return'over-tat';
  if((due-now)/864e5<=2)return'approaching';
  return'on-track';
}
function fdt(dt){if(!dt)return'-';const d=new Date(dt);if(isNaN(d))return String(dt);return d.toLocaleDateString('en-GB')+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});}
function frem(r){
  if(r.Status==='Completed')return'Completed';
  const diff=calcDue(r.Request_DateTime,r.TAT_Value,r.TAT_Unit)-new Date();
  if(diff<0){const h=Math.abs(Math.floor(diff/36e5));const d=Math.floor(h/24);return d>0?`Overdue ${d}d ${h%24}h`:`Overdue ${h}h`;}
  const h=Math.floor(diff/36e5);const d=Math.floor(h/24);return d>0?`${d}d ${h%24}h left`:`${h}h left`;
}
function sname(id){const s=staffList.find(x=>x.Staff_ID==id);return s?s.Staff_Name:id||'-';}
function lname(id){
  if(!id||id==='-'||id==='')return'-';
  // Try exact Partner_Name match
  let l=partnerLabs.find(x=>String(x.Partner_Name)===String(id));
  if(l)return l.Partner_Name;
  // Try Lab_ID match
  l=partnerLabs.find(x=>String(x.Lab_ID)===String(id));
  if(l)return l.Partner_Name;
  // Try case-insensitive
  l=partnerLabs.find(x=>String(x.Partner_Name).toLowerCase()===String(id).toLowerCase());
  if(l)return l.Partner_Name;
  // Try partial match
  l=partnerLabs.find(x=>String(id).toLowerCase().includes(String(x.Partner_Name).toLowerCase())||String(x.Partner_Name).toLowerCase().includes(String(id).toLowerCase()));
  if(l)return l.Partner_Name;
  return String(id);
}

// TABS
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  renderTab();
}
function sortRows(rows){
  const s=document.getElementById('sortSel')?.value||'default';
  const urgent=rows.filter(r=>r.Urgent==='Yes'||r.Urgent===true);
  const normal=rows.filter(r=>r.Urgent!=='Yes'&&r.Urgent!==true);
  function applySort(arr){
    if(s==='date_asc')return arr.sort((a,b)=>new Date(a.Request_DateTime)-new Date(b.Request_DateTime));
    if(s==='date_desc')return arr.sort((a,b)=>new Date(b.Request_DateTime)-new Date(a.Request_DateTime));
    if(s==='tat_asc')return arr.sort((a,b)=>calcDue(a.Request_DateTime,a.TAT_Value,a.TAT_Unit)-calcDue(b.Request_DateTime,b.TAT_Value,b.TAT_Unit));
    if(s==='patient_az')return arr.sort((a,b)=>(a.Patient_Name||'').localeCompare(b.Patient_Name||''));
    // Default: Approaching first, then On Track, sorted by due date ascending
    return arr.sort((a,b)=>{
      const sa=tatStatus(a);const sb=tatStatus(b);
      if(sa==='approaching'&&sb!=='approaching')return-1;
      if(sa!=='approaching'&&sb==='approaching')return 1;
      return calcDue(a.Request_DateTime,a.TAT_Value,a.TAT_Unit)-calcDue(b.Request_DateTime,b.TAT_Value,b.TAT_Unit);
    });
  }
  return[...applySort(urgent),...applySort(normal)];
}
function renderTab(){
  updateBadges();
  const q=document.getElementById('searchInput').value.toLowerCase();
  let data=allRequests.filter(r=>!q||
    (r.Request_ID||'').toLowerCase().includes(q)||
    (r.Patient_Name||'').toLowerCase().includes(q)||
    lname(r.Partner).toLowerCase().includes(q)||
    (r.Remark||'').toLowerCase().includes(q)||
    (r.Physician_Institution||'').toLowerCase().includes(q)||
    (r.Test_Name||'').toLowerCase().includes(q)||
    (r.Country||'').toLowerCase().includes(q)
  );
  if(currentTab==='overtat')renderOverTAT(data);
  else if(currentTab==='pending')renderPending(data);
  else renderCompleted(data);
}
function updateBadges(){
  document.getElementById('b-overtat').textContent=allRequests.filter(r=>tatStatus(r)==='over-tat').length;
  document.getElementById('b-pending').textContent=allRequests.filter(r=>r.Status==='Pending'&&tatStatus(r)!=='over-tat').length;
  document.getElementById('b-completed').textContent=allRequests.filter(r=>r.Status==='Completed').length;
}
function renderOverTAT(data){
  const rows=data.filter(r=>tatStatus(r)==='over-tat');
  const el=document.getElementById('tabContent');
  if(!rows.length){el.innerHTML='<div class="empty"><div class="eicon">✅</div><h3>No overdue requests</h3><p>All tests within TAT.</p></div>';return;}
  // Urgent first
  const urgent=sortRows(rows.filter(r=>r.Urgent==='Yes'||r.Urgent===true));
  // Cambodia
  const cam=sortRows(rows.filter(r=>{
    if(r.Urgent==='Yes'||r.Urgent===true)return false;
    const l=partnerLabs.find(x=>String(x.Partner_Name)===String(r.Partner)||String(x.Lab_ID)===String(r.Partner));
    return l&&l.Country==='Cambodia';
  }));
  // Overseas
  const oth=sortRows(rows.filter(r=>{
    if(r.Urgent==='Yes'||r.Urgent===true)return false;
    const l=partnerLabs.find(x=>String(x.Partner_Name)===String(r.Partner)||String(x.Lab_ID)===String(r.Partner));
    return!l||l.Country!=='Cambodia';
  }));
  let html='';
  if(urgent.length)html+='<div class="group-header">🚨 Urgent</div>'+urgent.map(r=>card(r,'over-tat')).join('');
  if(cam.length)html+='<div class="group-header">🇰🇭 Cambodia</div>'+cam.map(r=>card(r,'over-tat')).join('');
  if(oth.length)html+='<div class="group-header">🌏 Overseas</div>'+oth.map(r=>card(r,'over-tat')).join('');
  el.innerHTML=html;
}
function renderPending(data){
  // Only show Approaching and On Track — NOT Over TAT
  let rows=data.filter(r=>r.Status==='Pending'&&tatStatus(r)!=='over-tat');
  // Urgent always on top
  const urgent=sortRows(rows.filter(r=>r.Urgent==='Yes'||r.Urgent===true));
  const cam=sortRows(rows.filter(r=>{
    if(r.Urgent==='Yes'||r.Urgent===true)return false;
    const l=partnerLabs.find(x=>String(x.Partner_Name)===String(r.Partner)||String(x.Lab_ID)===String(r.Partner));
    return l&&l.Country==='Cambodia';
  }));
  const oth=sortRows(rows.filter(r=>{
    if(r.Urgent==='Yes'||r.Urgent===true)return false;
    const l=partnerLabs.find(x=>String(x.Partner_Name)===String(r.Partner)||String(x.Lab_ID)===String(r.Partner));
    return!l||l.Country!=='Cambodia';
  }));
  const el=document.getElementById('tabContent');
  if(!rows.length){el.innerHTML='<div class="empty"><div class="eicon">🎉</div><h3>No pending requests</h3></div>';return;}
  let html='';
  if(urgent.length)html+='<div class="group-header">🚨 Urgent</div>'+urgent.map(r=>card(r,tatStatus(r))).join('');
  if(cam.length)html+='<div class="group-header">🇰🇭 Cambodia</div>'+cam.map(r=>card(r,tatStatus(r))).join('');
  if(oth.length)html+='<div class="group-header">🌏 Overseas</div>'+oth.map(r=>card(r,tatStatus(r))).join('');
  el.innerHTML=html;
}
function renderCompleted(data){
  const rows=data.filter(r=>r.Status==='Completed').sort((a,b)=>new Date(b.Released_DateTime)-new Date(a.Released_DateTime));
  const el=document.getElementById('tabContent');
  if(!rows.length){el.innerHTML='<div class="empty"><div class="eicon">📋</div><h3>No completed requests</h3></div>';return;}
  el.innerHTML=rows.map(r=>card(r,'completed')).join('');
}

function card(r,status){
  const lbl={'over-tat':'OVER TAT','approaching':'APPROACHING','on-track':'ON TRACK','completed':'COMPLETED'};
  const bc={'over-tat':'over','approaching':'approach','on-track':'ontrack','completed':'done'};
  const vc={'over-tat':'red','approaching':'orange','on-track':'green','completed':''};
  const due=calcDue(r.Request_DateTime,r.TAT_Value,r.TAT_Unit);
  const isAdmin=currentUser&&currentUser.Role==='Admin';
  const adminBtns=isAdmin?`<button class="bdel" onclick="deleteReq('${r.Row_ID}','${r.Request_ID}')">🗑️ Delete</button>`:'';
  const isUrgent=r.Urgent==='Yes'||r.Urgent===true;
  const urgentBtn=r.Status==='Pending'?`<button class="burgent ${isUrgent?'active':''}" onclick="toggleUrgent('${r.Row_ID}',${isUrgent})">${isUrgent?'🚨 Urgent':'⚑ Urgent'}</button>`:'';
  const urgentMark=isUrgent?`<span class="urgent-badge">🚨 URGENT</span>`:'';
  const inst=r.Physician_Institution?` <span style="font-size:12px;font-weight:400;opacity:.75;">(${r.Physician_Institution})</span>`:'';

  let footer='';
  if(r.Status==='Pending')footer=`<div class="card-footer"><button class="bcomplete" onclick="openComplete('${r.Row_ID}')">✔ Mark as Completed</button></div>`;
  else if(r.Status==='Completed')footer=`<div class="card-footer"><button class="breopen" onclick="reopenReq('${r.Row_ID}')">↩ Reopen</button></div>`;
  return`<div class="rcard ${status}">
    <div class="card-header ${status}">
      <div class="card-header-left">
        <span class="card-id-pill">${r.Request_ID}</span>
        <span class="card-patient-name">${r.Patient_Name}${inst}</span>
        ${urgentMark}
      </div>
      <div class="card-header-right">
        <span class="sbadge ${bc[status]}">${lbl[status]}</span>
        ${urgentBtn}
        <button class="bedit" onclick="openEdit('${r.Row_ID}')">✏️ Edit</button>
        ${adminBtns}
      </div>
    </div>
    <div class="card-body">
      <div class="card-grid">
        <div class="ci"><span class="ci-lbl">Test Name</span><span class="ci-val">${r.Test_Name||'-'}</span></div>
        <div class="ci"><span class="ci-lbl">Partner Lab</span><span class="ci-val blue">${lname(r.Partner)}</span></div>
        <div class="ci"><span class="ci-lbl">Country</span><span class="ci-val blue">${r.Country||'-'}</span></div>
        <div class="ci"><span class="ci-lbl">TAT</span><span class="ci-val">${r.TAT_Value} ${r.TAT_Unit}</span></div>
        <div class="ci"><span class="ci-lbl">Due Date</span><span class="ci-val">${fdt(due)}</span></div>
        <div class="ci"><span class="ci-lbl">Remaining</span><span class="ci-val ${vc[status]}">${frem(r)}</span></div>
        <div class="ci"><span class="ci-lbl">Created By</span><span class="ci-val">${sname(r.Created_By)}</span></div>
        <div class="ci"><span class="ci-lbl">Request Date</span><span class="ci-val">${fdt(r.Request_DateTime)}</span></div>
        ${r.Specimen?`<div class="ci"><span class="ci-lbl">Specimen</span><span class="ci-val">${r.Specimen}</span></div>`:''}
        ${r.Remark?`<div class="ci"><span class="ci-lbl">Remark</span><span class="ci-val">${r.Remark}</span></div>`:''}
        ${r.Status==='Completed'?`<div class="ci"><span class="ci-lbl">Released By</span><span class="ci-val">${sname(r.Released_By)}</span></div><div class="ci"><span class="ci-lbl">Released At</span><span class="ci-val">${fdt(r.Released_DateTime)}</span></div>`:''}
      </div>
    </div>
    ${footer}
  </div>`;
}

// EDIT REQUEST — allows editing Request ID, Test, and all fields
function openEdit(rowId){
  const r=allRequests.find(x=>x.Row_ID==rowId);if(!r)return;
  editingRowId=rowId;
  document.getElementById('reqTitle').textContent='Edit Request';
  document.getElementById('reqSaveBtn').textContent='Update Request';
  document.getElementById('testSectionHint').textContent='(change if needed)';
  // Fill basic fields
  document.getElementById('f-rid').value=r.Request_ID;
  document.getElementById('f-rid').readOnly=false;
  document.getElementById('f-dt').value=fdt(r.Request_DateTime);
  document.getElementById('f-patient').value=r.Patient_Name||'';
  document.getElementById('f-inst').value=r.Physician_Institution||'';
  document.getElementById('f-specimen').value=r.Specimen||'';
  document.getElementById('f-remark').value=r.Remark||'';
  document.getElementById('f-createdby').value=r.Created_By||'';
  // Match partner lab by Partner_Name (stored value) or Lab_ID
  const ps=document.getElementById('f-partner');
  ps.value='';
  for(let i=0;i<ps.options.length;i++){
    if(String(ps.options[i].value)===String(r.Partner)||
       String(ps.options[i].dataset.labid)===String(r.Partner)){
      ps.selectedIndex=i;break;
    }
  }
  const selOpt=ps.options[ps.selectedIndex];
  document.getElementById('f-country').value=selOpt&&selOpt.dataset.country?selOpt.dataset.country:r.Country||'';
  // Pre-select test — find in testMaster by Test_ID or Test_Name
  selTests={};
  let foundTest=testMaster.find(t=>String(t.Test_ID)===String(r.Test_ID));
  if(!foundTest&&r.Test_Name)foundTest=testMaster.find(t=>t.Test_Name===r.Test_Name);
  if(foundTest){
    selTests[foundTest.Test_ID]=foundTest;
  }else if(r.Test_Name){
    // Test not in master — use stored values
    const fakeId=r.Test_ID||r.Test_Name;
    selTests[fakeId]={Test_ID:fakeId,Test_Name:r.Test_Name,TAT_Value:r.TAT_Value||'',TAT_Unit:r.TAT_Unit||'',Category:r.Category||''};
  }
  document.getElementById('tsearch').value='';
  document.getElementById('tdd').innerHTML='';
  document.getElementById('tdd').classList.remove('open');
  renderTags();
  document.getElementById('reqModal').classList.add('open');
}

// SAVE REQUEST
async function saveRequest(){
  if(isSaving)return;
  const btn=document.getElementById('reqSaveBtn');
  const rid=document.getElementById('f-rid').value.trim();
  const patient=document.getElementById('f-patient').value.trim();
  const partnerSel=document.getElementById('f-partner');
  const partner=partnerSel.value;
  const partnerOpt=partnerSel.options[partnerSel.selectedIndex];
  const partnerName=partnerOpt?partnerOpt.text.split(' — ')[0].trim():'';
  const createdBy=document.getElementById('f-createdby').value;
  if(!rid||!patient||!partner||!createdBy){alert('Please fill all required fields:\n• Request ID\n• Patient Name\n• Partner Laboratory\n• Created By');return;}
  if(!/^BTD-\d{6}$/.test(rid)){alert('Request ID must be in format BTD-000001');return;}
  const selected=Object.values(selTests);
  if(!selected.length){alert('Please select at least one test');return;}
  const inst=document.getElementById('f-inst').value.trim();
  const country=document.getElementById('f-country').value;
  const specimen=document.getElementById('f-specimen').value.trim();
  const remark=document.getElementById('f-remark').value.trim();

  if(editingRowId){
    isSaving=true;setBtn(btn,'Updating...',true);
    const t=selected[0];
    try{
      const res=await api({
        action:'editRequest',Row_ID:editingRowId,
        Request_ID:rid,
        Patient_Name:patient,Physician_Institution:inst,
        Partner:partner,Partner_Name:partnerName,
        Country:country,Created_By:createdBy,
        Test_ID:t.Test_ID,Test_Name:t.Test_Name,
        TAT_Value:t.TAT_Value,TAT_Unit:t.TAT_Unit,
        Category:t.Category||'',
        Specimen:specimen,Remark:remark
      });
      if(res.error){alert('Error: '+res.error);return;}
      closeM('reqModal');showToast('✅ Request updated successfully');
      await loadAll();
    }catch(e){alert('Network error. Please try again.');}
    finally{isSaving=false;setBtn(btn,'Update Request',false);}
    return;
  }

  // NEW
  isSaving=true;
  setBtn(btn,'Saving...',true);
  closeM('reqModal');
  showToast(`⏳ Saving ${selected.length} test(s)...`);
  try{
    await Promise.all(selected.map(t=>api({
      action:'addRequest',
      Request_ID:rid,Patient_Name:patient,
      Physician_Institution:inst,
      Partner:partner,Partner_Name:partnerName,
      Country:country,Created_By:createdBy,
      Test_ID:t.Test_ID,Test_Name:t.Test_Name,
      TAT_Value:t.TAT_Value,TAT_Unit:t.TAT_Unit,
      Category:t.Category||'',Specimen:specimen,Remark:remark
    })));
    showToast(`✅ Saved ${selected.length} test(s) successfully`);
    await loadAll();
  }catch(e){showToast('❌ Error saving. Please try again.');}
  finally{isSaving=false;setBtn(btn,'Save Request',false);}
}

// URGENT TOGGLE
async function toggleUrgent(rowId,isCurrentlyUrgent){
  const newVal=isCurrentlyUrgent?'No':'Yes';
  try{
    await api({action:'updateRequest',Row_ID:rowId,Status:allRequests.find(r=>r.Row_ID==rowId)?.Status||'Pending',Urgent:newVal,UpdateUrgent:'true'});
    showToast(newVal==='Yes'?'🚨 Marked as Urgent':'⚑ Urgent removed');
    await loadAll();
  }catch(e){alert('Error updating urgent status.');}
}

// DELETE REQUEST (Admin only)
async function deleteReq(rowId,requestId){
  if(!confirm(`Delete request ${requestId}?\n\nThis cannot be undone.`))return;
  try{
    const res=await api({action:'deleteRequest',Row_ID:rowId});
    if(res.error){alert('Error: '+res.error);return;}
    showToast(`🗑️ Request ${requestId} deleted`);
    await loadAll();
  }catch(e){alert('Error deleting request.');}
}

// COMPLETE
function openComplete(rowId){completingRowId=rowId;document.getElementById('releasedBy').value='';document.getElementById('completeModal').classList.add('open');}
async function confirmComplete(){
  const btn=document.getElementById('confirmBtn');if(btn.disabled)return;
  const rb=document.getElementById('releasedBy').value;
  if(!rb){alert('Please select who is releasing this result');return;}
  setBtn(btn,'Saving...',true);
  try{
    await api({action:'updateRequest',Row_ID:completingRowId,Status:'Completed',Released_By:rb});
    closeM('completeModal');showToast('✅ Marked as Completed');await loadAll();
  }catch(e){alert('Error. Please try again.');}
  finally{setBtn(btn,'Confirm',false);}
}
async function reopenReq(rowId){
  if(!confirm('Reopen this request?'))return;
  try{await api({action:'updateRequest',Row_ID:rowId,Status:'Pending',Released_By:''});showToast('↩ Request reopened');await loadAll();}
  catch(e){alert('Error reopening.');}
}

// CHANGE PASSWORD
function openChangePw(){['pw-old','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');document.getElementById('pwErr').style.display='none';document.getElementById('pwModal').classList.add('open');}
async function doChangePw(){
  const btn=document.getElementById('pwBtn');if(btn.disabled)return;
  const old=document.getElementById('pw-old').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-confirm').value;
  if(!old||!nw||!cf){showErr('pwErr','Please fill all fields');return;}
  if(nw!==cf){showErr('pwErr','New passwords do not match');return;}
  if(nw.length<4){showErr('pwErr','Password must be at least 4 characters');return;}
  setBtn(btn,'Updating...',true);
  try{
    const res=await api({action:'changePassword',User_ID:currentUser.User_ID,OldPassword:old,NewPassword:nw});
    if(res.error){showErr('pwErr',res.error);return;}
    closeM('pwModal');showToast('🔑 Password updated successfully');
    currentUser.Password=nw;localStorage.setItem('labUser',JSON.stringify(currentUser));
  }catch(e){showErr('pwErr','Error. Please try again.');}
  finally{setBtn(btn,'Update Password',false);}
}

// USER MGMT
function openUserMgmt(){renderUsers();document.getElementById('userModal').classList.add('open');}
function renderUsers(){
  const el=document.getElementById('userList');
  if(!usersList.length){el.innerHTML='<div class="empty"><h3>No users found</h3></div>';return;}
  el.innerHTML=`<table class="utable">
    <thead><tr><th>#</th><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${usersList.map(u=>`<tr>
      <td>${u.User_ID}</td><td><strong>${u.Username}</strong></td>
      <td><span class="rb ${u.Role==='Admin'?'admin':'staff'}">${u.Role}</span></td>
      <td><span style="color:${u.Active==='Yes'?'var(--green)':'var(--red)'};">${u.Active==='Yes'?'Active':'Inactive'}</span></td>
      <td>${u.Username!==currentUser.Username?`<button class="bdng bsm" onclick="delUser('${u.User_ID}','${u.Username}')">Delete</button>`:'<span style="color:var(--muted);font-size:12px;">You</span>'}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}
function openAddUser(){['nu-user','nu-pass'].forEach(id=>document.getElementById(id).value='');document.getElementById('nu-role').value='Staff';document.getElementById('addUserErr').style.display='none';document.getElementById('addUserModal').classList.add('open');}
async function doAddUser(){
  const btn=document.getElementById('addUserBtn');if(btn.disabled)return;
  const u=document.getElementById('nu-user').value.trim();
  const p=document.getElementById('nu-pass').value;
  const r=document.getElementById('nu-role').value;
  if(!u||!p){showErr('addUserErr','Please fill all fields');return;}
  if(p.length<4){showErr('addUserErr','Password must be at least 4 characters');return;}
  setBtn(btn,'Adding...',true);
  try{
    const res=await api({action:'addUser',Username:u,Password:p,Role:r});
    if(res.error){showErr('addUserErr',res.error);return;}
    closeM('addUserModal');showToast('✅ User added successfully');
    usersList=arr(await api({action:'getUsers'}));renderUsers();
  }catch(e){showErr('addUserErr','Error. Please try again.');}
  finally{setBtn(btn,'Add User',false);}
}
async function delUser(id,username){
  if(!confirm(`Delete user "${username}"?\nThis cannot be undone.`))return;
  try{
    await api({action:'deleteUser',User_ID:id});showToast('🗑️ User deleted');
    usersList=arr(await api({action:'getUsers'}));renderUsers();
  }catch(e){alert('Error deleting user.');}
}

// UTILS
function closeM(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}
function setBtn(btn,text,disabled){btn.disabled=disabled;btn.innerHTML=disabled?`<span class="spinner"></span>${text}`:text;}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function arr(x){return Array.isArray(x)?x:[];}


</script>
